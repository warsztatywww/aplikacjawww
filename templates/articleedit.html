{% extends "base.html" %}

{% load static %}
{% load crispy_forms_tags %}

{% block content %}
  <div class="container">
    <article class="col-sm-12 maincontent">
      {% if title %}
        <header>
          <h1>{{ title }}</h1>
        </header>
      {% endif %}
      <div role="tabpanel">
        {% crispy form %}
      </div>
    </article>
  </div>
{% endblock %}

{% block script %}
  <script src="{% static 'dist/tinymce.js' %}"></script>
  <link rel="stylesheet" href="{% static 'dist/tinymce.css' %}">
{% endblock %}
